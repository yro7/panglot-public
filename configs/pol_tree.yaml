  name: Polski
  children:
    - id: cases
      name: Przypadki (Cases)
      children:

        - id: accusative
          name: Biernik (Accusative)
          node_instructions: >
            Generate a cloze deletion exercise focused on the accusative case (Biernik).
            Create a sentence where the student must fill in a noun in the accusative form. You'll also include sometimes an exercise with two words to fill : an adjective and the noun. Also, always include the noun's root (and the adjective's root if there is one) as hint(s).
          children: []
