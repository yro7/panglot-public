language_name: Danish
root:
  id: root
  name: "Dansk"
  children:

    # ═══════════════════════════════════════════════════════════════
    # PRONUNCIATION — training the ear
    # ═══════════════════════════════════════════════════════════════
    - id: pronunciation_listening
      name: "Udtale og Lytteforståelse (Pronunciation)"
      node_instructions: >
        Generate an exercise focusing on Danish phonology and listening comprehension.
        Contrast the unique vowels and consonants like the soft 'd'.
      children:

        - id: vowel_sounds
          name: "Vokaler (The letters æ, ø, å)"
          node_instructions: >
            Generate multiple choice exercises to distinguish between the unique Danish vowels
            æ, ø, å. Test the student's ability to recognize these sounds in everyday words.
          children: []

        - id: soft_d
          name: "Det bløde D (The soft D)"
          prerequisites: [vowel_sounds]
          node_instructions: >
            Generate an identification exercise focusing on the famous Danish "soft d".
            Contrast words with a hard 'd' at the start (dansk, drikke) and a soft 'd'
            in the middle or end (mad, gade).
          children: []

        - id: minimal_pairs_listening
          name: "Lytteøvelser (Minimal pairs)"
          prerequisites: [vowel_sounds]
          node_instructions: >
            Generate exercises using minimal pairs to train the ear on tricky Danish sounds
            and vowel length (e.g., 'læse' vs 'læsse', or 'y' vs 'u').
            The student must select the correct word based on an audio cue.
          children: []

    # ═══════════════════════════════════════════════════════════════
    # GRAMMAR — nouns and verbs
    # ═══════════════════════════════════════════════════════════════
    - id: grammar
      name: "Grammatik (Basic Grammar)"
      prerequisites: [pronunciation_listening]
      node_instructions: >
        Generate a mixed grammar exercise for Danish. Cover pronouns, gender, or definiteness.
      children:

        - id: pronouns_and_basics
          name: "Stedord og Basisverber (Pronouns & Verbs)"
          node_instructions: >
            Generate exercises introducing personal pronouns (jeg, du, han, hun, vi, I, de)
            and the present tense of 'være' (to be) and 'have' (to have).
            Use simple matching or cloze deletion.
          children: []

        - id: noun_gender
          name: "Navneord og Køn (Gender: en/et)"
          prerequisites: [pronouns_and_basics]
          node_instructions: >
            Generate a cloze deletion exercise focused on Danish noun genders (common vs. neuter).
            Student must provide the correct indefinite article (en or et).
          children: []

        - id: definiteness_simple
          name: "Bestemthed (Definiteness)"
          prerequisites: [noun_gender]
          node_instructions: >
            Generate an exercise focusing on the Danish definite suffix (e.g., mand -> manden,
            hus -> huset). Contrast the definite form with the indefinite form.
          children: []

    # ═══════════════════════════════════════════════════════════════
    # SYNTAX — word order and sentences
    # ═══════════════════════════════════════════════════════════════
    - id: syntax_and_sentences
      name: "Syntaks og Sætninger (Syntax)"
      prerequisites: [grammar]
      node_instructions: >
        Generate an exercise on Danish sentence construction. Focus on questions,
        negation, and the V2 rule.
      children:

        - id: basic_questions
          name: "Spørgsmål (Questions)"
          node_instructions: >
            Generate exercises on forming basic questions using inversion (Spiser du? = Do you eat?)
            and primary question words (Hvem, Hvad, Hvor, Hvordan).
          children: []

        - id: negation
          name: "Nægtelse (Negation 'ikke')"
          prerequisites: [basic_questions]
          node_instructions: >
            Generate exercises where the student must place 'ikke' correctly in simple sentences
            (usually directly after the first verb, e.g., "Jeg forstår ikke").
          children: []

        - id: v2_word_order_basic
          name: "Ledstilling (The V2 rule)"
          prerequisites: [negation]
          node_instructions: >
            Generate a word ordering exercise focusing on the V2 rule. Use simple time
            adverbs at the beginning (e.g., "I dag spiser jeg").
          children: []

    # ═══════════════════════════════════════════════════════════════
    # VOCABULARY — daily life
    # ═══════════════════════════════════════════════════════════════
    - id: vocabulary_and_daily_life
      name: "Ordforråd og Hverdag (Vocabulary)"
      prerequisites: [pronunciation_listening]
      node_instructions: >
        Generate a vocabulary exercise across common Danish themes like greetings,
        numbers, or travel phrases.
      children:

        - id: greetings_politeness
          name: "Hilsner og Høflighed (Greetings)"
          node_instructions: >
            Generate exercises with everyday phrases: "Hej", "Goddag", "Tak", "Selv tak".
            Focus on full, usable chunks rather than individual words.
          children: []

        - id: numbers
          name: "Tal (Numbers)"
          prerequisites: [greetings_politeness]
          node_instructions: >
            Generate an exercise for numbers 1-100. Pay attention to the unique logic
            of Danish numbers 50-90 (halvtreds, tres, etc.).
          children: []

        - id: survival_phrases
          name: "Overlevelsesfraser (Survival Phrases)"
          prerequisites: [numbers]
          node_instructions: >
            Generate translation or matching exercises with complete sentences for survival
            (e.g., "Hvor er toilettet?", "Hvad koster det?").
          children: []