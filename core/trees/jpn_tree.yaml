language_name: Japanese
root:
  id: root
  name: 日本語 (Japanese)
  children:
    - id: writing_systems
      name: 文字 (Writing Systems)
      children:
        - id: hiragana
          name: ひらがな (Hiragana)
          node_instructions: >
            Generate an exercise focusing on reading or recognizing basic Hiragana characters.
          children: []
        - id: katakana
          name: カタカナ (Katakana)
          node_instructions: >
            Generate an exercise focusing on reading or recognizing basic Katakana characters, often used for loanwords.
          children: []
        - id: kanji_basics
          name: 漢字 (Basic Kanji)
          node_instructions: >
            Generate an exercise focusing on basic N5-level Kanji (e.g., numbers, days of the week, basic nature words).
          children: []
    - id: grammar
      name: 文法 (Grammar)
      children:
        - id: particles
          name: 助詞 (Particles)
          node_instructions: >
            Generate a cloze deletion exercise focused on basic Japanese particles (wa, ga, wo, ni, de).
            Create a sentence where the student must fill in the correct particle.
          children: []
        - id: verb_conjugation
          name: 動詞の活用 (Verb Conjugation)
          node_instructions: >
            Generate an exercise focused on basic verb conjugation (e.g., dictionary form to polite -masu form, or past tense -mashita).
            Create a sentence where the student must conjugate a given verb correctly.
          children: []
        - id: adjective_conjugation
          name: 形容詞の活用 (Adjective Conjugation)
          node_instructions: >
            Generate an exercise focused on I-adjective or Na-adjective conjugation (e.g., affirmative to negative).
          children: []
    - id: vocabulary
      name: 語彙 (Vocabulary)
      children:
        - id: greetings
          name: 挨拶 (Greetings)
          node_instructions: >
            Generate an exercise about common Japanese greetings (aisatsu) and polite expressions.
          children: []
        - id: daily_life
          name: 日常生活 (Daily Life)
          node_instructions: >
            Generate an exercise about daily life vocabulary (food, transport, shopping, etc.).
          children: []
