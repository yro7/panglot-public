language_name: Japanese
root:
  id: root
  name: 日本語 (Japanese)
  children:

    # ═══════════════════════════════════════════════════════════════
    # WRITING SYSTEMS — the three scripts
    # ═══════════════════════════════════════════════════════════════
    - id: writing_systems
      name: 文字 (Writing Systems)
      node_instructions: >
        Generate an exercise focusing on one of the three Japanese writing systems:
        Hiragana, Katakana, or basic Kanji.
      children:

        - id: hiragana
          name: ひらがな (Hiragana)
          node_instructions: >
            Generate an exercise focusing on reading or recognizing basic Hiragana characters.
            Test the student's ability to map sounds to their syllabic symbols.
          children: []

        - id: katakana
          name: カタカナ (Katakana)
          prerequisites: [hiragana]
          node_instructions: >
            Generate an exercise focusing on reading or recognizing Katakana characters,
            commonly used for loanwords. Contrast similar Katakana shapes (e.g., シ vs ツ).
          children: []

        - id: kanji_basics
          name: 漢字 (Basic Kanji)
          prerequisites: [hiragana]
          node_instructions: >
            Generate an exercise focusing on basic N5-level Kanji (e.g., numbers, days,
            nature words). Test both the Oni-yomi/Kun-yomi readings and the character meaning.
          children: []

    # ═══════════════════════════════════════════════════════════════
    # GRAMMAR — particles and conjugation
    # ═══════════════════════════════════════════════════════════════
    - id: grammar
      name: 文法 (Grammar)
      prerequisites: [writing_systems]
      node_instructions: >
        Generate a mixed grammar exercise for Japanese. Focus on particles,
        verb endings, or adjective forms.
      children:

        - id: particles
          name: 助詞 (Particles)
          node_instructions: >
            Generate a cloze deletion exercise focused on basic Japanese particles
            (wa, ga, wo, ni, de, no). Student must fill in the correct particle to
            complete the sentence's logical structure.
          children: []

        - id: verb_conjugation
          name: 動詞の活用 (Verb Conjugation)
          prerequisites: [particles]
          node_instructions: >
            Generate an exercise focused on basic verb conjugation (e.g., dictionary form
            to polite -masu form, or past tense -mashita). Provide the verb root
            and target form.
          children: []

        - id: adjective_conjugation
          name: 形容詞の活用 (Adjective Conjugation)
          prerequisites: [particles]
          node_instructions: >
            Generate an exercise focused on I-adjective or Na-adjective conjugation
            (e.g., affirmative to negative, or past tense). Highlight the different
            rules for the two adjective types.
          children: []

    # ═══════════════════════════════════════════════════════════════
    # VOCABULARY — daily life
    # ═══════════════════════════════════════════════════════════════
    - id: vocabulary
      name: 語彙 (Vocabulary)
      prerequisites: [writing_systems]
      node_instructions: >
        Generate a thematic vocabulary exercise for Japanese. Pick a theme like
        food, time, or family members.
      children:

        - id: greetings
          name: 挨拶 (Greetings)
          node_instructions: >
            Generate a dialogue exercise about common Japanese greetings (aisatsu) and
            polite expressions (ohayou, konnichiwa, arigatou). Include details on
            formal vs informal settings.
          children: []

        - id: daily_life
          name: 日常生活 (Daily Life)
          prerequisites: [greetings]
          node_instructions: >
            Generate an exercise about daily life vocabulary: food, transport, shopping,
            and common objects. Test the student's ability to recognize these words
            in simple Japanese sentences.
          children: []
