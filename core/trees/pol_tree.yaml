root:
  id: root
  name: Polski
  children:

    # ═══════════════════════════════════════════════════════════════
    # DECLENSIONS PROGRESSION
    # ═══════════════════════════════════════════════════════════════
    - id: accusative
      name: Biernik (Accusative)
      node_instructions: >
        Generate a cloze deletion exercise focused on the accusative case (Biernik). Context
        must trigger accusative (direct object of transitive verb, or prepositions na, w, przez,
        o with motion/target sense).
      children: []

    - id: genitive
      name: Dopełniacz (Genitive)
      prerequisites: [accusative]
      node_instructions: >
        Generate a cloze focused on the genitive case (Dopełniacz). Trigger contexts: negation
        of a direct object (nie mam + gen), possession, after quantifiers, after prepositions.
      children: []

    - id: instrumental
      name: Narzędnik (Instrumental)
      prerequisites: [genitive]
      node_instructions: >
        Generate a cloze for the instrumental case (Narzędnik). Trigger contexts: means/tool,
        predicate noun after "być", after prepositions z, przed, nad, pod, za, między.
      children: []

    - id: locative
      name: Miejscownik (Locative)
      prerequisites: [genitive]
      node_instructions: >
        Generate a cloze for the locative case (Miejscownik). This case ONLY appears after
        prepositions: w, na, o, po, przy. Emphasize palatalization.
      children: []

    - id: dative
      name: Celownik (Dative)
      prerequisites: [genitive]
      node_instructions: >
        Generate a cloze for the dative case (Celownik). Trigger contexts: indirect object,
        dative-subject idioms, certain verbs (pomagać, dziękować, ufać).
      children: []

    - id: vocative
      name: Wołacz (Vocative)
      prerequisites: [genitive]
      node_instructions: >
        Generate a direct-address exercise using the vocative case (Wołacz).
      children: []
