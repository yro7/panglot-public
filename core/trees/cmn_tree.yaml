language_name: Mandarin Chinese
root:
  id: root
  name: 汉语 (Mandarin Chinese)
  children:

    # ═══════════════════════════════════════════════════════════════
    # PRONUNCIATION — the tonal foundation
    # ═══════════════════════════════════════════════════════════════
    - id: pronunciation
      name: 发音 (Pronunciation)
      node_instructions: >
        Generate an exercise focusing on Pinyin and the phonological structure of Mandarin.
        Combine tone recognition with initial/final distinctions.
      children:

        - id: pinyin_tones
          name: 拼音与声调 (Pinyin & Tones)
          node_instructions: >
            Generate an exercise focusing on Pinyin pronunciation and the four tones plus the
            neutral tone. This involves identifying the correct tone mark for a given word
            or distinguishing between words that differ only by tone (e.g., mā, má, mǎ, mà).
          children: []

        - id: initials_finals
          name: 声母与韵母 (Initials & Finals)
          prerequisites: [pinyin_tones]
          node_instructions: >
            Generate an exercise focusing on distinguishing between similar-sounding initials
            (e.g., z/zh, c/ch, s/sh) and finals (e.g., an/ang, en/eng). Student identifies
            the correct Pinyin component from audio or pinyin clusters.
          children: []

    # ═══════════════════════════════════════════════════════════════
    # CHARACTERS — reading and writing
    # ═══════════════════════════════════════════════════════════════
    - id: characters
      name: 汉字 (Chinese Characters)
      prerequisites: [pronunciation]
      node_instructions: >
        Generate a character-focused exercise. This can cover strokes, radicals, or
        full character recognition and meaning.
      children:

        - id: basic_strokes_radicals
          name: 基本笔画与部首 (Basic Strokes & Radicals)
          node_instructions: >
            Generate an exercise focusing on recognizing basic Chinese character strokes
            (e.g., 横, 竖, 撇, 捺) and common radicals (e.g., 亻, 木, 口, 氵).
            Test how radicals provide semantic clues to a character's meaning.
          children: []

        - id: common_characters
          name: 常用汉字 (Common Characters)
          prerequisites: [basic_strokes_radicals]
          node_instructions: >
            Generate an exercise focusing on recognizing and understanding frequently used
            Chinese characters (e.g., numbers, common nouns like 人, 大, 小, 天).
            Test both the character's meaning and its Pinyin transcription.
          children: []

    # ═══════════════════════════════════════════════════════════════
    # GRAMMAR — building sentences
    # ═══════════════════════════════════════════════════════════════
    - id: grammar
      name: 语法 (Grammar)
      prerequisites: [pronunciation]
      node_instructions: >
        Generate a mixed grammar exercise for Mandarin. Target measure words,
        particle usage, or basic sentence positioning.
      children:

        - id: measure_words
          name: 量词 (Measure Words)
          node_instructions: >
            Generate a cloze deletion exercise focused on the correct usage of common Chinese
            measure words (e.g., 个, 本, 杯, 块, 件). Student must fill in the appropriate
            measure word for a given noun in context.
          children: []

        - id: basic_sentence_structure
          name: 基本句型 (Basic Sentence Structure)
          prerequisites: [measure_words]
          node_instructions: >
            Generate an exercise focused on constructing basic SVO sentences and simple
            "是...的" (shì...de) structures. Student reorders scrambled words into a
            grammatically correct Mandarin sentence.
          children: []

        - id: aspect_particles
          name: 动态助词 (Aspect Particles)
          prerequisites: [basic_sentence_structure]
          node_instructions: >
            Generate a cloze deletion exercise focused on the usage of aspect particles
            了 (le), 着 (zhe), and 过 (guo) to indicate completion, ongoing action,
            or past experience. Focus on the nuances of time and completion.
          children: []

        - id: word_order_adverbials
          name: 状语语序 (Adverbial Word Order)
          prerequisites: [basic_sentence_structure]
          node_instructions: >
            Generate an exercise focusing on the correct placement of adverbials (time, place,
            manner) before the verb. Test the "Subject + Time + Place + Verb" default structure.
          children: []

    # ═══════════════════════════════════════════════════════════════
    # VOCABULARY — survivor and daily themes
    # ═══════════════════════════════════════════════════════════════
    - id: vocabulary
      name: 词汇 (Vocabulary)
      prerequisites: [pronunciation]
      node_instructions: >
        Generate a vocabulary cloze exercise across random everyday Mandarin themes.
        Pick themes like food, family, or colors.
      children:

        - id: greetings
          name: 问候语 (Greetings)
          node_instructions: >
            Generate a dialogue exercise about common Mandarin greetings (你好, 早上好),
            farewells (再见), and polite expressions (谢谢, 对不起). Include the
            correct context (e.g., time of day).
          children: []

        - id: daily_life
          name: 日常生活 (Daily Life)
          prerequisites: [greetings]
          node_instructions: >
            Generate an exercise about daily life vocabulary: food, family members,
            transport, and shopping. Test the student's ability to recognize these
            high-frequency nouns in simple sentence contexts.
          children: []