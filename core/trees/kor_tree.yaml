language_name: Korean
root:
  id: root
  name: 한국어 (Korean)
  children:
    - id: writing_system
      name: 쓰기 시스템 (Writing System)
      children:
        - id: hangul_basics
          name: 한글 기초 (Hangul Basics)
          node_instructions: >
            Generate an exercise focusing on recognizing and writing basic Hangul characters (consonants and vowels).
          children: []
        - id: batchim_reading
          name: 받침 읽기 (Reading Batchim)
          node_instructions: >
            Generate an exercise focusing on reading syllables with final consonants (Batchim).
          children: []
    - id: grammar
      name: 문법 (Grammar)
      children:
        - id: particles
          name: 조사 (Particles/Postpositions)
          node_instructions: >
            Generate a cloze deletion exercise focused on basic Korean particles (e.g., 은/는, 이/가, 을/를, 에/에서).
            Create a sentence where the student must fill in the correct particle.
          children: []
        - id: verb_conjugation
          name: 동사 활용 (Verb Conjugation)
          node_instructions: >
            Generate an exercise focused on basic verb conjugation (e.g., dictionary form to polite -아요/어요 form).
            Create a sentence where the student must conjugate a given verb correctly.
          children: []
        - id: sentence_structure
          name: 문장 구조 (Sentence Structure)
          node_instructions: >
            Generate an exercise focusing on basic Korean sentence structure (SOV order, topic vs. subject).
            Provide jumbled words and ask the student to form a grammatically correct sentence.
          children: []
        - id: honorifics
          name: 존댓말 (Honorifics)
          node_instructions: >
            Generate an exercise focusing on basic honorifics, including polite endings (-습니다/-습니다) and the honorific suffix -시-.
          children: []
    - id: vocabulary
      name: 어휘 (Vocabulary)
      children:
        - id: greetings
          name: 인사말 (Greetings)
          node_instructions: >
            Generate an exercise about common Korean greetings, farewells, and polite expressions.
          children: []
        - id: daily_life
          name: 일상생활 (Daily Life)
          node_instructions: >
            Generate an exercise about daily life vocabulary (e.g., food, family, numbers, time, common objects).
          children: []
    - id: pronunciation
      name: 발음 (Pronunciation)
      children:
        - id: batchim_pronunciation_rules
          name: 받침 발음 규칙 (Batchim Pronunciation Rules)
          node_instructions: >
            Generate an exercise focusing on the pronunciation rules of final consonants (Batchim), including how they change when followed by certain initial consonants.
          children: []
        - id: sound_changes
          name: 음운 변동 (Sound Changes)
          node_instructions: >
            Generate an exercise focusing on common Korean sound change rules such as assimilation, palatalization, and liaison.
            Provide words or phrases and ask the student to identify or produce the correct pronunciation.
          children: []